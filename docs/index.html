<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ULID Tools</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main x-data="ulidApp">
    <h1>ULID Tools</h1>

    <!-- Generate Section -->
    <section>
      <h2>Generate</h2>
      <div class="controls">
        <label for="count">Count:</label>
        <input type="number" id="count" x-model.number="count" min="1" max="100">
        <button @click="generate()">Generate</button>
        <button class="secondary" @click="reset()">Reset</button>
      </div>

      <template x-for="(r, ri) in results" :key="ri">
        <div class="result-block" :class="{ 'has-copied': copiedField && copiedField.startsWith('gen-' + ri) }">
          <div class="result-row" :class="{ copied: copiedField === 'gen-' + ri + '-ulid' }" @click="copyValue(r.ulid, 'gen-' + ri + '-ulid')">
            <span class="result-label">ULID:</span>
            <span class="result-value" x-text="r.ulid"></span>
          </div>
          <div class="result-row" :class="{ copied: copiedField === 'gen-' + ri + '-uuid' }" @click="copyValue(r.uuid, 'gen-' + ri + '-uuid')">
            <span class="result-label">uuid:</span>
            <span class="result-value" x-text="r.uuid"></span>
          </div>
          <div class="result-row" :class="{ copied: copiedField === 'gen-' + ri + '-hex' }" @click="copyValue(r.hex, 'gen-' + ri + '-hex')">
            <span class="result-label">hex:</span>
            <span class="result-value" x-text="r.hex"></span>
          </div>
          <div class="result-row" :class="{ copied: copiedField === 'gen-' + ri + '-ts' }" @click="copyValue(r.timestamp, 'gen-' + ri + '-ts')">
            <span class="result-label">timestamp:</span>
            <span class="result-value" x-text="r.timestamp"></span>
          </div>
        </div>
      </template>
    </section>

    <!-- Convert Section -->
    <section>
      <h2>Convert</h2>
      <div class="convert-input">
        <input type="text" placeholder="Enter ULID, UUID, or hex..." x-model="convertInput" @input="convert()" spellcheck="false" autocomplete="off">
      </div>

      <template x-if="convertResult">
        <div>
          <div class="detected-format">Detected format: <strong x-text="convertResult.format.toUpperCase()"></strong></div>
          <div class="result-block" :class="{ 'has-copied': copiedField && copiedField.startsWith('conv-') }">
            <div class="result-row" :class="{ copied: copiedField === 'conv-ulid' }" @click="copyValue(convertResult.ulid, 'conv-ulid')">
              <span class="result-label">ULID:</span>
              <span class="result-value" x-text="convertResult.ulid"></span>
            </div>
            <div class="result-row" :class="{ copied: copiedField === 'conv-uuid' }" @click="copyValue(convertResult.uuid, 'conv-uuid')">
              <span class="result-label">uuid:</span>
              <span class="result-value" x-text="convertResult.uuid"></span>
            </div>
            <div class="result-row" :class="{ copied: copiedField === 'conv-hex' }" @click="copyValue(convertResult.hex, 'conv-hex')">
              <span class="result-label">hex:</span>
              <span class="result-value" x-text="convertResult.hex"></span>
            </div>
            <div class="result-row" :class="{ copied: copiedField === 'conv-ts' }" @click="copyValue(convertResult.timestamp, 'conv-ts')">
              <span class="result-label">timestamp:</span>
              <span class="result-value" x-text="convertResult.timestamp"></span>
            </div>
          </div>
        </div>
      </template>

      <template x-if="convertError">
        <div class="error-msg" x-text="convertError"></div>
      </template>
    </section>

    <!-- Toast -->
    <div class="toast" x-show="copiedField" x-transition.opacity>Copied!</div>
  </main>

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
