<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ULID Tools</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main x-data="ulidApp" x-cloak>
    <div class="page-header">
      <h1>ULID Tools</h1>
      <div class="toggle-group">
        <div class="segment" @click="useUuid = !useUuid">
          <span class="seg-option" :class="{ active: useUuid }">uuid</span>
          <span class="seg-option" :class="{ active: !useUuid }">hex</span>
        </div>
        <div class="segment" @click="useUtc = !useUtc">
          <span class="seg-option" :class="{ active: useUtc }">UTC</span>
          <span class="seg-option" :class="{ active: !useUtc }">Localtime</span>
        </div>
      </div>
    </div>

    <div class="two-col">
      <!-- Left: Inputs -->
      <div class="col-input">
        <section>
          <h2>Generate</h2>
          <div class="controls">
            <input type="text" id="customTime" x-model="customTime" placeholder="timestamp: now" spellcheck="false" autocomplete="off" @keydown.enter="generate()" title="Timestamp">
            <input type="text" id="count" x-model="countInput" placeholder="cnt: 5" @keydown.enter="generate()" title="Count" inputmode="numeric">
            <button @click="generate()">Generate</button>
          </div>
          <template x-if="genError">
            <div class="error-msg" x-text="genError"></div>
          </template>
        </section>

        <section>
          <h2>Convert</h2>
          <div class="convert-input">
            <textarea placeholder="Enter ULID, UUID, hex, or timestamp (one per line)..." x-model="convertInput" @input="convert()" spellcheck="false" autocomplete="off" rows="10"></textarea>
          </div>
          <template x-if="convertError">
            <div class="error-msg" x-text="convertError"></div>
          </template>
        </section>
      </div>

      <!-- Right: Results -->
      <div class="col-result">
        <template x-if="displayResults.length > 0">
          <div>
            <div class="result-view-controls">
              <div class="segment" >
                <template x-for="col in viewColumns" :key="col.key">
                  <span class="seg-option" :class="{ active: viewMode === col.key }" @click="viewMode = col.key" x-text="col.label"></span>
                </template>
              </div>
              <button class="copy-all-btn" @click="copyAllColumn($event)" x-show="viewMode !== 'all'">Copy all</button>
            </div>

            <template x-if="viewMode === 'all'">
              <div>
                <template x-for="(r, ri) in displayResults" :key="ri">
                  <div class="result-block" :class="{ 'has-copied': copiedField && copiedField.startsWith(r._prefix) }">
                    <template x-for="f in resultFields(r, r._prefix)" :key="f.id">
                      <div class="result-row" :class="{ copied: copiedField === f.id }" @click="copyValue(f.value, f.id, $event)">
                        <span class="result-label" x-text="f.label"></span>
                        <span class="result-value" x-text="f.value"></span>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </template>

            <template x-if="viewMode !== 'all'">
              <div class="column-list">
                <template x-for="(val, vi) in columnValues" :key="vi">
                  <div class="column-row" :class="{ copied: copiedField === 'col-' + vi }" @click="copyValue(val, 'col-' + vi, $event)">
                    <span class="result-value" x-text="val"></span>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </template>
        <template x-if="displayResults.length === 0">
          <div class="empty-results">No results yet.</div>
        </template>
      </div>
    </div>

    <!-- Toast -->
    <div class="toast" x-show="copiedField"
      x-transition:enter="toast-enter"
      x-transition:enter-start="toast-hidden"
      x-transition:enter-end="toast-visible"
      x-transition:leave="toast-leave"
      x-transition:leave-start="toast-visible"
      x-transition:leave-end="toast-hidden" :style="`left:${toastX}px;top:${toastY}px`">Copied!</div>
  </main>

  <footer>
    <a href="https://github.com/alarky/ulidtools-web" class="github-btn" target="_blank" rel="noopener">
      <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      alarky/ulidtools-web
    </a>
  </footer>

  <script type="module" src="main.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
</body>
</html>
