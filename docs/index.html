<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ULID Tools</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main x-data="ulidApp">
    <div class="page-header">
      <h1>ULID Tools</h1>
      <div class="toggle-group">
        <div class="segment" @click="useUuid = !useUuid">
          <span class="seg-option" :class="{ active: useUuid }">uuid</span>
          <span class="seg-option" :class="{ active: !useUuid }">hex</span>
        </div>
        <div class="segment" @click="useUtc = !useUtc">
          <span class="seg-option" :class="{ active: useUtc }">UTC</span>
          <span class="seg-option" :class="{ active: !useUtc }">Localtime</span>
        </div>
      </div>
    </div>

    <div class="two-col">
      <!-- Left: Inputs -->
      <div class="col-input">
        <section>
          <h2>Generate</h2>
          <div class="controls">
            <input type="text" id="customTime" x-model="customTime" placeholder="timestamp: now" spellcheck="false" autocomplete="off" @keydown.enter="generate()" title="Timestamp">
            <input type="text" id="count" x-model="countInput" placeholder="cnt: 5" @keydown.enter="generate()" title="Count" inputmode="numeric">
            <button @click="generate()">Generate</button>
          </div>
          <template x-if="genError">
            <div class="error-msg" x-text="genError"></div>
          </template>
        </section>

        <section>
          <h2>Convert</h2>
          <div class="convert-input">
            <textarea placeholder="Enter ULID, UUID, hex, or timestamp (one per line)..." x-model="convertInput" @input="convert()" spellcheck="false" autocomplete="off" rows="10"></textarea>
          </div>
          <template x-if="convertError">
            <div class="error-msg" x-text="convertError"></div>
          </template>
        </section>
      </div>

      <!-- Right: Results -->
      <div class="col-result">
        <template x-for="(r, ri) in displayResults" :key="ri">
          <div class="result-block" :class="{ 'has-copied': copiedField && copiedField.startsWith(r._prefix) }">
            <template x-for="f in resultFields(r, r._prefix)" :key="f.id">
              <div class="result-row" :class="{ copied: copiedField === f.id }" @click="copyValue(f.value, f.id)">
                <span class="result-label" x-text="f.label"></span>
                <span class="result-value" x-text="f.value"></span>
              </div>
            </template>
          </div>
        </template>
        <template x-if="displayResults.length === 0">
          <div class="empty-results">No results yet.</div>
        </template>
      </div>
    </div>

    <!-- Toast -->
    <div class="toast" x-show="copiedField" x-transition.opacity>Copied!</div>
  </main>

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
